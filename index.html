<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeAgent AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{
    --bg:#0A0E17; --bg2:#0D1220;
    --glass:rgba(255,255,255,0.055); --glass-strong:rgba(255,255,255,0.09);
    --glass-border:rgba(255,255,255,0.10); --glass-border-strong:rgba(255,255,255,0.18);
    --text:#E9EBF6; --text-dim:#9AA0BC; --text-faint:#5D6280;
    --accent:#8B7CFF; --accent-2:#3FD9C7; --warn:#FFB870; --danger:#FF7A7A;
    --accent-soft:rgba(139,124,255,0.14); --accent2-soft:rgba(63,217,199,0.14);
    --shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }
  :root[data-theme="light"]{
    --bg:#F3F4FA; --bg2:#EAEBF6;
    --glass:rgba(255,255,255,0.65); --glass-strong:rgba(255,255,255,0.85);
    --glass-border:rgba(30,30,60,0.08); --glass-border-strong:rgba(30,30,60,0.14);
    --text:#181A2A; --text-dim:#585C78; --text-faint:#8C90AC;
    --accent:#6A56E8; --accent-2:#0EA394; --warn:#C87A17; --danger:#D14343;
    --accent-soft:rgba(106,86,232,0.10); --accent2-soft:rgba(14,163,148,0.10);
    --shadow: 0 20px 50px -25px rgba(30,30,60,0.25);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif; color:var(--text); background:var(--bg);
    background-image:
      radial-gradient(circle at 10% 0%, var(--accent-soft), transparent 45%),
      radial-gradient(circle at 90% 20%, var(--accent2-soft), transparent 40%),
      radial-gradient(circle at 50% 100%, var(--accent-soft), transparent 50%);
    background-attachment: fixed;
    overflow:hidden;
  }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--glass-border-strong); border-radius:8px;}
  ::selection{background:var(--accent); color:#fff;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea,select{font-family:inherit; color:var(--text);}

  #app{display:flex; height:100vh; width:100vw;}

  /* ---- Sidebar ---- */
  .sidebar{
    width:236px; flex-shrink:0; padding:22px 14px; display:flex; flex-direction:column;
    border-right:1px solid var(--glass-border); background:var(--glass);
    backdrop-filter:blur(20px);
  }
  .brand{display:flex; align-items:center; gap:10px; padding:6px 10px 26px 10px;}
  .orb{
    width:34px; height:34px; border-radius:50%; flex-shrink:0; position:relative;
    background: conic-gradient(from 0deg, var(--accent), var(--accent-2), var(--accent));
    animation: spin 8s linear infinite, breathe 3.2s ease-in-out infinite;
    box-shadow: 0 0 24px var(--accent-soft);
  }
  .orb::after{
    content:''; position:absolute; inset:5px; border-radius:50%;
    background:var(--bg); opacity:0.55;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  @keyframes breathe{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.12);} }
  .brand-name{font-weight:700; font-size:16.5px; letter-spacing:-0.01em;}
  .brand-sub{font-size:10.5px; color:var(--text-faint); letter-spacing:0.08em; text-transform:uppercase; margin-top:1px;}

  .nav{display:flex; flex-direction:column; gap:3px; flex:1;}
  .nav-item{
    display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:12px;
    color:var(--text-dim); font-size:14px; font-weight:500; background:none; border:none;
    text-align:left; width:100%; transition:background .15s, color .15s;
  }
  .nav-item svg{width:18px; height:18px; flex-shrink:0; opacity:0.85;}
  .nav-item:hover{background:var(--glass-strong); color:var(--text);}
  .nav-item.active{background:var(--accent-soft); color:var(--accent);}
  .nav-item.active svg{opacity:1;}

  .sidebar-foot{display:flex; flex-direction:column; gap:8px; padding-top:14px; border-top:1px solid var(--glass-border);}
  .theme-toggle{
    display:flex; align-items:center; justify-content:space-between; padding:9px 12px;
    border-radius:12px; background:var(--glass-strong); border:1px solid var(--glass-border);
    font-size:13px; color:var(--text-dim);
  }
  .switch{width:36px; height:20px; border-radius:20px; background:var(--glass-border-strong); position:relative; border:none; flex-shrink:0;}
  .switch::after{content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--accent); transition:left .2s;}
  .switch.on::after{left:18px;}

  /* ---- Main ---- */
  .main{flex:1; overflow-y:auto; padding:28px 34px 60px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;}
  .page-title{font-size:22px; font-weight:700; letter-spacing:-0.01em;}
  .page-sub{color:var(--text-dim); font-size:13.5px; margin-top:2px;}

  .card{
    background:var(--glass); border:1px solid var(--glass-border); border-radius:20px;
    padding:20px; backdrop-filter:blur(16px); box-shadow:var(--shadow);
  }
  .grid{display:grid; gap:16px;}
  .g2{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:1fr 1fr 1fr;}

  .btn{
    display:inline-flex; align-items:center; gap:6px; border:none; border-radius:11px;
    padding:9px 15px; font-size:13.5px; font-weight:600; transition:transform .12s, opacity .12s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:var(--glass-strong); color:var(--text); border:1px solid var(--glass-border);}
  .btn-ghost:hover{border-color:var(--glass-border-strong);}
  .btn-sm{padding:6px 11px; font-size:12.5px; border-radius:9px;}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}

  input[type=text], input[type=date], input[type=time], textarea, select{
    background:var(--bg2); border:1px solid var(--glass-border); border-radius:11px;
    padding:9px 12px; font-size:13.5px; width:100%; outline:none; color:var(--text);
  }
  input:focus, textarea:focus, select:focus{border-color:var(--accent);}
  textarea{resize:vertical; min-height:70px;}
  label{font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-faint); font-weight:600; display:block; margin-bottom:5px;}

  .pill{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:600;}
  .pill-high{background:rgba(255,122,122,0.15); color:var(--danger);}
  .pill-medium{background:rgba(255,184,112,0.15); color:var(--warn);}
  .pill-low{background:rgba(63,217,199,0.15); color:var(--accent-2);}
  .tag{background:var(--accent-soft); color:var(--accent); padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600;}

  .empty{padding:30px 10px; text-align:center; color:var(--text-faint); font-size:13.5px;}
  .empty .orb{margin:0 auto 12px;}

  hr.div{border:none; border-top:1px solid var(--glass-border); margin:14px 0;}

  /* Dashboard */
  .greet{font-size:26px; font-weight:700; letter-spacing:-0.015em; margin-bottom:2px;}
  .stat-num{font-size:26px; font-weight:700; font-family:'Space Grotesk';}
  .stat-label{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .list-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--glass-border);}
  .list-row:last-child{border-bottom:none;}
  .checkbox{width:18px; height:18px; border-radius:6px; border:1.5px solid var(--glass-border-strong); flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg2);}
  .checkbox.done{background:var(--accent); border-color:var(--accent);}
  .quick-actions{display:flex; gap:10px; flex-wrap:wrap;}
  .qa-btn{
    display:flex; flex-direction:column; align-items:flex-start; gap:8px; padding:14px;
    border-radius:16px; background:var(--glass-strong); border:1px solid var(--glass-border);
    flex:1; min-width:130px; text-align:left; color:var(--text);
  }
  .qa-btn:hover{border-color:var(--accent);}

  /* Chat */
  .chat-wrap{display:flex; flex-direction:column; height:calc(100vh - 130px);}
  .chat-log{flex:1; overflow-y:auto; padding:10px 4px; display:flex; flex-direction:column; gap:14px;}
  .msg{display:flex; gap:10px; max-width:78%;}
  .msg.user{align-self:flex-end; flex-direction:row-reverse;}
  .msg-avatar{width:28px; height:28px; border-radius:50%; flex-shrink:0;}
  .msg-avatar.ai{background:conic-gradient(from 0deg, var(--accent), var(--accent-2), var(--accent));}
  .msg-avatar.user{background:var(--glass-border-strong);}
  .bubble{padding:11px 15px; border-radius:16px; font-size:14px; line-height:1.55; white-space:pre-wrap;}
  .msg.ai .bubble{background:var(--glass-strong); border:1px solid var(--glass-border); border-top-left-radius:4px;}
  .msg.user .bubble{background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; border-top-right-radius:4px;}
  .chat-input-bar{display:flex; gap:10px; margin-top:14px;}
  .typing{display:flex; gap:4px; padding:6px 0;}
  .typing span{width:6px; height:6px; border-radius:50%; background:var(--text-faint); animation:tb 1.1s infinite;}
  .typing span:nth-child(2){animation-delay:.15s;} .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes tb{0%,60%,100%{opacity:.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);}}

  /* Notes / tasks / goals items */
  .item-card{background:var(--glass-strong); border:1px solid var(--glass-border); border-radius:16px; padding:15px; margin-bottom:11px;}
  .item-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .item-title{font-weight:600; font-size:14.5px;}
  .item-body{color:var(--text-dim); font-size:13px; margin-top:5px; line-height:1.5;}
  .item-actions{display:flex; gap:6px; flex-shrink:0;}
  .icon-btn{width:28px; height:28px; border-radius:8px; background:transparent; border:1px solid var(--glass-border); display:flex; align-items:center; justify-content:center; color:var(--text-dim);}
  .icon-btn:hover{border-color:var(--accent); color:var(--accent);}
  .progress-track{height:7px; border-radius:8px; background:var(--glass-border); overflow:hidden; margin-top:8px;}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius:8px; transition:width .3s;}

  /* Calendar */
  .cal-grid{display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;}
  .cal-dow{text-align:center; font-size:11px; color:var(--text-faint); font-weight:600; padding-bottom:4px;}
  .cal-day{min-height:78px; border-radius:12px; background:var(--glass-strong); border:1px solid var(--glass-border); padding:7px; font-size:12px; position:relative; cursor:pointer;}
  .cal-day.other{opacity:0.3;}
  .cal-day.today{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset;}
  .cal-day.selected{border-color:var(--accent-2); box-shadow:0 0 0 1px var(--accent-2) inset;}
  .cal-daynum{font-weight:600; font-size:12.5px;}
  .cal-dot{width:5px; height:5px; border-radius:50%; background:var(--accent); display:inline-block; margin-right:2px;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.45); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:50;}
  .modal{background:var(--bg2); border:1px solid var(--glass-border-strong); border-radius:20px; padding:24px; width:420px; max-width:92vw; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow);}
  .modal h3{margin-bottom:16px; font-size:17px;}
  .field{margin-bottom:13px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}

  .search-bar{position:relative;}
  .search-bar input{padding-left:36px;}
  .search-bar svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-faint);}

  .tabbar{display:flex; gap:6px; margin-bottom:18px; background:var(--glass); border:1px solid var(--glass-border); border-radius:13px; padding:4px; width:fit-content;}
  .tabbar button{background:none; border:none; padding:7px 15px; border-radius:9px; font-size:13px; font-weight:600; color:var(--text-dim);}
  .tabbar button.active{background:var(--accent-soft); color:var(--accent);}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--glass-border-strong); padding:11px 20px; border-radius:12px; font-size:13px; box-shadow:var(--shadow); z-index:100; opacity:0; transition:opacity .25s, transform .25s;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  @media (max-width: 860px){
    .sidebar{position:fixed; z-index:40; height:100vh; transform:translateX(-100%); transition:transform .2s;}
    .sidebar.open{transform:translateX(0);}
    .main{padding:20px;}
    .g2,.g3{grid-template-columns:1fr;}
    .menu-btn{display:flex !important;}
  }
  .menu-btn{display:none; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px; background:var(--glass-strong); border:1px solid var(--glass-border); color:var(--text);}
</style>
</head>
<body data-theme="dark">
<div id="app"></div>

<script>
/* ---------------- ICONS ---------------- */
const ICONS = {
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
  notes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6M9 9h1"/></svg>',
  tasks:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  goals:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>',
  memory:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.5 2A5.5 5.5 0 0 0 4 7.5c0 1 .3 2 .8 2.8A5.5 5.5 0 0 0 4 15a5.5 5.5 0 0 0 5.5 5.5M9.5 2A5.5 5.5 0 0 1 15 7.5c0 1-.3 2-.8 2.8A5.5 5.5 0 0 1 15 15a5.5 5.5 0 0 1-5.5 5.5M9.5 2v18.5"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>',
  sparkle:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/></svg>',
  menu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>',
  close:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>',
};

/* ---------------- STATE ---------------- */
let state = {
  section:'dashboard', theme:'dark', name:'there',
  notes:[], tasks:[], goals:[], events:[], chat:[],
  memoryQuery:'', memoryAnswer:'', memoryLoading:false,
  chatLoading:false, calMonth:new Date().getMonth(), calYear:new Date().getFullYear(), calSelected:null,
  weather:null, sidebarOpen:false, notesTab:'all', goalsTab:'all',
  modal:null, modalData:null,
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(s){ if(!s) return ''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short', day:'numeric'}); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- STORAGE ---------------- */
async function loadAll(){
  const keys = ['notes','tasks','goals','events','chat','settings'];
  for(const k of keys){
    try{
      const r = await window.storage.get(k);
      if(r && r.value){
        const val = JSON.parse(r.value);
        if(k==='settings'){ state.theme = val.theme||'dark'; state.name = val.name||'there'; }
        else state[k] = val;
      }
    }catch(e){ /* key not found yet, ignore */ }
  }
  document.body.setAttribute('data-theme', state.theme);
  render();
  loadWeather();
}
async function persist(key){
  try{
    let val;
    if(key==='settings') val = JSON.stringify({theme:state.theme, name:state.name});
    else val = JSON.stringify(state[key]);
    await window.storage.set(key, val);
  }catch(e){ console.error('storage failed', e); showToast('Could not save — storage error'); }
}

/* ---------------- AI ---------------- */
async function callClaude(systemPrompt, userMessage){
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        system: systemPrompt,
        messages:[{role:'user', content:userMessage}]
      })
    });
    const data = await res.json();
    if(data && data.content){
      return data.content.map(b=>b.text||'').join('\n').trim();
    }
    return "I couldn't generate a response just now. Please try again.";
  }catch(e){
    return "I couldn't reach the AI right now (" + e.message + ").";
  }
}

/* ---------------- WEATHER ---------------- */
function loadWeather(){
  if(!navigator.geolocation){ return; }
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude, longitude} = pos.coords;
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=celsius`);
      const d = await r.json();
      if(d.current_weather){ state.weather = d.current_weather; render(); }
    }catch(e){ /* silent */ }
  }, ()=>{ /* denied, silent */ }, {timeout:4000});
}
function weatherEmoji(code){
  if(code===0) return '☀️';
  if([1,2,3].includes(code)) return '⛅';
  if([45,48].includes(code)) return '🌫️';
  if([51,53,55,56,57,61,63,65,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '❄️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌤️';
}

/* ---------------- TOAST ---------------- */
let toastTimer=null;
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

function renderTopbar(){

/* ---------------- CHAT ---------------- */
function renderChat(){
  return `
  <div class="chat-wrap">
    <div class="chat-log" id="chat-log">
      ${state.chat.length===0 ? `
        <div class="empty" style="margin:auto;">
          <div class="orb" style="margin:0 auto 14px;"></div>
          <div style="font-weight:600; color:var(--text); margin-bottom:4px;">Ask me anything</div>

        state.chat.map(m=>`
        <div class="msg ${m.role}">
          <div class="msg-avatar ${m.role}"></div>
          <div class="bubble">${escapeHtml(m.content)}</div>
        </div>`).join('')}
      ${state.chatLoading ? `<div class="msg ai"><div class="msg-avatar ai"></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>` : ''}
    </div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Message your agent…" onkeydown="if(event.key==='Enter') sendChat()">
      <button class="btn btn-primary" onclick="sendChat()" ${state.chatLoading?'disabled':''}>${ICONS.send} Send</button>
      ${state.chat.length>0 ? `<button class="btn btn-ghost" onclick="clearChat()">Clear</button>` : ''}
    </div>
  </div>`;
}
async function sendChat(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text || state.chatLoading) return;
  state.chat.push({role:'user', content:text, ts:Date.now()});
  input.value='';
  state.chatLoading = true;
  persist('chat'); render();
  scrollChatBottom();

  const history = state.chat.slice(-10).map(m=>`${m.role==='user'?'User':'Assistant'}: ${m.content}`).join('\n');
  const sys = "You are LifeAgent, a warm, capable personal AI assistant embedded in the user's daily planning app. Be concise, practical, and conversational. Here is the recent conversation for context:\n" + history;
  const reply = await callClaude(sys, text);
  state.chat.push({role:'ai', content:reply, ts:Date.now()});
  state.chatLoading = false;
  persist('chat'); render();
  scrollChatBottom();
}
function clearChat(){ state.chat=[]; persist('chat'); render(); }
function scrollChatBottom(){ setTimeout(()=>{ const l=document.getElementById('chat-log'); if(l) l.scrollTop = l.scrollHeight; }, 30); }

function toggleTask(id){ const t=state.tasks.find(x=>x.id===id); t.completed=!t.completed; persist('tasks'); render(); }
async function aiSuggestTasks(){
  showToast('Thinking of useful tasks…');
  const context = "Existing open tasks: " + state.tasks.filter(t=>!t.completed).map(t=>t.title).join(', ') +
    ". Active goals: " + state.goals.filter(g=>g.progress<100).map(g=>g.title).join(', ');
  const sys = "You are a productivity assistant. Given the user's current tasks and goals, suggest exactly 3 short, concrete new tasks that would help them make progress. Reply with just the 3 tasks, one per line, no numbering, no extra text.";
  const res = await callClaude(sys, context || "No tasks yet, suggest 3 generally useful daily tasks.");
  const lines = res.split('\n').map(l=>l.replace(/^[-•\d.)\s]+/,'').trim()).filter(Boolean).slice(0,3);
  lines.forEach(title=> state.tasks.push({id:uid(), title, priority:'medium', dueDate:todayStr(), category:'AI suggested', completed:false}));
  persist('tasks'); render(); showToast('Added '+lines.length+' suggested tasks');
}

/* ---------------- CALENDAR ---------------- */
function renderCalendar(){
  const y=state.calYear, m=state.calMonth;
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const cells=[];
  for(let i=startDow-1;i>=0;i--) cells.push({d:prevDays-i, other:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, other:false, dateStr:`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});
  while(cells.length%7!==0) cells.push({d:cells.length, other:true});
  const monthName = first.toLocaleDateString(undefined,{month:'long', year:'numeric'});
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const selectedItems = state.calSelected ? [
    ...state.tasks.filter(t=>t.dueDate===state.calSelected).map(t=>({type:'task', title:t.title})),
    ...state.events.filter(e=>e.date===state.calSelected).map(e=>({type:'event', title:e.title, time:e.time}))
  ] : [];

  return `
  <div class="grid" style="grid-template-columns:2.2fr 1fr; gap:16px; align-items:start;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <button class="btn btn-ghost btn-sm" onclick="shiftMonth(-1)">←</button>
        <h3 style="font-size:15px;">${monthName}</h3>
        <button class="btn btn-ghost btn-sm" onclick="shiftMonth(1)">→</button>
      </div>
      <div class="cal-grid">
        ${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells.map(c=>{
          if(c.other) return `<div class="cal-day other"><div class="cal-daynum">${c.d}</div></div>`;
          const isToday = c.dateStr===todayStr();
          const isSel = c.dateStr===state.calSelected;
          const dueCount = state.tasks.filter(t=>t.dueDate===c.dateStr).length + state.events.filter(e=>e.date===c.dateStr).length;
          return `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="state.calSelected='${c.dateStr}'; render();">
            <div class="cal-daynum">${c.d}</div>
            ${dueCount ? `<div style="margin-top:6px;">${'●'.repeat(Math.min(dueCount,3))}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:14.5px; margin-bottom:10px;">${state.calSelected ? fmtDate(state.calSelected) : 'Select a day'}</h3>
      ${state.calSelected ? `
        <button class="btn btn-ghost btn-sm" style="margin-bottom:12px;" onclick="openModal('event', null, '${state.calSelected}')">${ICONS.plus} Add event</button>
        ${selectedItems.length===0 ? `<div class="empty">Nothing scheduled.</div>` :
          selectedItems.map(it=>`<div class="list-row"><span class="tag">${it.type}</span><span style="flex:1; font-size:13px;">${escapeHtml(it.title)}</span>${it.time?`<span class="page-sub">${it.time}</span>`:''}</div>`).join('')}
      ` : `<div class="empty">Click a date to see what's on.</div>`}
    </div>
  </div>`;
}
function shiftMonth(dir){
  state.calMonth += dir;
  if(state.calMonth<0){ state.calMonth=11; state.calYear--; }
  if(state.calMonth>11){ state.calMonth=0; state.calYear++; }
  render();
}

/* ---------------- GOALS ---------------- */
function renderGoals(){
  const filtered = state.goalsTab==='all' ? state.goals : state.goals.filter(g=>g.period===state.goalsTab);

    <button class="btn btn-primary" onclick="openModal('goal')">${ICONS.plus} New goal</button>
  </div>
  ${filtered.length===0 ? `<div class="card empty">No goals in this view yet.</div>` :

      <div class="item-card">
        <div class="item-top">
          <div>
            <span class="tag" style="margin-bottom:6px; display:inline-block;">${g.period}</span>
            <div class="item-title">${escapeHtml(g.title)}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" onclick="aiBreakdownGoal('${g.id}')" title="Break into tasks">${ICONS.sparkle}</button>

function updateGoalProgress(id, val){ const g=state.goals.find(x=>x.id===id); g.progress=parseInt(val); persist('goals');
  const track = event.target.closest('.item-card').querySelector('.progress-fill');
  if(track) track.style.width = val+'%';
  const label = event.target.closest('.item-card').querySelector('.page-sub');
  if(label) label.textContent = val+'% complete';
}
async function aiBreakdownGoal(id){
  const g = state.goals.find(x=>x.id===id); if(!g) return;
  showToast('Breaking goal into tasks…');
  const sys = "You are a planning assistant. Break the given goal into exactly 3 small, concrete, actionable tasks. Reply with just the 3 tasks, one per line, no numbering.";
  const res = await callClaude(sys, `Goal (${g.period}): ${g.title}`);
  const lines = res.split('\n').map(l=>l.replace(/^[-•\d.)\s]+/,'').trim()).filter(Boolean).slice(0,3);
  lines.forEach(title=> state.tasks.push({id:uid(), title, priority:'medium', dueDate:'', category:'Goal: '+g.title, completed:false}));
  persist('tasks'); render(); showToast('Added '+lines.length+' tasks toward "'+g.title+'"');
}

/* ---------------- MEMORY ---------------- */
function renderMemory(){

    ...state.notes.filter(n=>(n.title+n.body+(n.tags||[]).join(' ')).toLowerCase().includes(q)).map(n=>({type:'Note', title:n.title, snippet:n.body.slice(0,100)})),
    ...state.tasks.filter(t=>t.title.toLowerCase().includes(q)).map(t=>({type:'Task', title:t.title, snippet:t.dueDate?('Due '+fmtDate(t.dueDate)):''})),

    </div>
    ${state.memoryLoading ? `<div class="typing" style="margin-top:12px;"><span></span><span></span><span></span></div>` : ''}

  </div>
  <div class="card">
    <div class="search-bar" style="margin-bottom:12px;">
      ${ICONS.search}
      <input type="text" placeholder="Search notes, tasks, goals…" value="${escapeHtml(state.memoryQuery)}" oninput="state.memoryQuery=this.value; renderInto('section-content', renderMemory);">
    </div>
    ${!q ? `<div class="empty">Type to search everything you've saved.</div>` :
      results.length===0 ? `<div class="empty">Nothing found for "${escapeHtml(state.memoryQuery)}".</div>` :
      results.map(r=>`<div class="list-row"><span class="tag">${r.type}</span><div style="flex:1;"><div style="font-size:13.5px;">${escapeHtml(r.title)}</div><div class="page-sub">${escapeHtml(r.snippet)}</div></div></div>`).join('')}
  </div>`;
}
function renderInto(elId, fn){ document.getElementById(elId).innerHTML = fn(); }
async function askMemory(){
  const input = document.getElementById('memory-ask');
  const q = input.value.trim();
  if(!q) return;
  state.memoryLoading = true; render();
  const context = [
    "NOTES:", ...state.notes.map(n=>`- ${n.title}: ${n.body}`),
    "TASKS:", ...state.tasks.map(t=>`- ${t.title} (${t.completed?'done':'open'}, due ${t.dueDate||'n/a'})`),
    "GOALS:", ...state.goals.map(g=>`- ${g.title} (${g.period}, ${g.progress}% done)`)
  ].join('\n') || "The user hasn't saved anything yet.";
  const sys = "You are the user's personal memory assistant. Answer the question using ONLY the saved data below. If it's not there, say you don't have that saved. Be brief and direct.\n\n" + context;
  const answer = await callClaude(sys, q);
  state.memoryAnswer = answer;
  state.memoryLoading = false;
  render();
}

/* ---------------- SETTINGS ---------------- */
function renderSettings(){
  return `
  <div class="grid g2">
    <div class="card">
      <h3 style="font-size:14.5px; margin-bottom:14px;">Profile</h3>
      <div class="field"><label>Your name</label><input type="text" value="${escapeHtml(state.name)}" onchange="state.name=this.value; persist('settings');"></div>
      <div class="field"><label>Theme</label>
        <select onchange="state.theme=this.value; document.body.setAttribute('data-theme', this.value); persist('settings'); render();">
          <option value="dark" ${state.theme==='dark'?'selected':''}>Dark</option>
          <option value="light" ${state.theme==='light'?'selected':''}>Light</option>
        </select>
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:14.5px; margin-bottom:14px;">Your data</h3>
      <div class="page-sub" style="margin-bottom:12px;">Everything is stored privately to your account, in this app.</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="exportData()">Export as JSON</button>
        <button class="btn btn-ghost" style="color:var(--danger); border-color:var(--danger);" onclick="clearAllData()">Delete all data</button>
      </div>
    </div>
    <div class="card" style="grid-column:span 2;">
      <h3 style="font-size:14.5px; margin-bottom:10px;">Plan</h3>
      <div class="page-sub">You're on the <b style="color:var(--accent);">Free</b> plan — limited AI chats and automations. This prototype doesn't enforce limits or process payments.</div>
    </div>
  </div>`;
}
function exportData(){
  const blob = new Blob([JSON.stringify({notes:state.notes, tasks:state.tasks, goals:state.goals, events:state.events}, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='lifeagent-export.json'; a.click();
}
function clearAllData(){
  if(!confirm('Delete all notes, tasks, goals and events? This cannot be undone.')) return;
  state.notes=[]; state.tasks=[]; state.goals=[]; state.events=[]; state.chat=[];
  ['notes','tasks','goals','events','chat'].forEach(persist);
  render(); showToast('All data cleared');
}

/* ---------------- SHARED ITEM OPS ---------------- */
function deleteItem(store, id){
  state[store] = state[store].filter(x=>x.id!==id);
  persist(store); render();
}

/* ---------------- MODALS ---------------- */
function openModal(type, id, prefillDate){
  state.modal = type;
  if(type==='note') state.modalData = id ? {...state.notes.find(n=>n.id===id)} : {id:null, title:'', body:'', tags:[], favorite:false};
  if(type==='task') state.modalData = id ? {...state.tasks.find(t=>t.id===id)} : {id:null, title:'', priority:'medium', dueDate:todayStr(), category:'', completed:false};
  if(type==='goal') state.modalData = id ? {...state.goals.find(g=>g.id===id)} : {id:null, title:'', period:'weekly', progress:0};
  if(type==='event') state.modalData = {id:null, title:'', date: prefillDate||todayStr(), time:''};
  render();
}
function closeModal(){ state.modal=null; state.modalData=null; render(); }
function renderModal(){
  const d = state.modalData;
  let body='';
  if(state.modal==='note'){
    body = `
      <div class="field"><label>Title</label><input type="text" id="m-title" value="${escapeHtml(d.title)}" placeholder="Note title"></div>
      <div class="field"><label>Content</label><textarea id="m-body" rows="6" placeholder="Write it down…">${escapeHtml(d.body)}</textarea></div>
      <div class="field"><label>Tags (comma separated)</label><input type="text" id="m-tags" value="${(d.tags||[]).join(', ')}" placeholder="idea, startup, personal"></div>
    `;
  } else if(state.modal==='task'){
    body = `
      <div class="field"><label>Title</label><input type="text" id="m-title" value="${escapeHtml(d.title)}" placeholder="What needs doing?"></div>
      <div class="field"><label>Priority</label><select id="m-priority">
        ${['low','medium','high'].map(p=>`<option value="${p}" ${d.priority===p?'selected':''}>${p}</option>`).join('')}
      </select></div>
      <div class="field"><label>Due date</label><input type="date" id="m-due" value="${d.dueDate||''}"></div>
      <div class="field"><label>Category</label><input type="text" id="m-category" value="${escapeHtml(d.category||'')}" placeholder="Work, personal…"></div>
    `;
  } else if(state.modal==='goal'){
    body = `
      <div class="field"><label>Title</label><input type="text" id="m-title" value="${escapeHtml(d.title)}" placeholder="What are you working toward?"></div>
      <div class="field"><label>Period</label><select id="m-period">
        ${['daily','weekly','monthly','yearly'].map(p=>`<option value="${p}" ${d.period===p?'selected':''}>${p}</option>`).join('')}
      </select></div>
    `;
  } else if(state.modal==='event'){
    body = `
      <div class="field"><label>Title</label><input type="text" id="m-title" value="${escapeHtml(d.title)}" placeholder="Event title"></div>
      <div class="field"><label>Date</label><input type="date" id="m-date" value="${d.date}"></div>
      <div class="field"><label>Time</label><input type="time" id="m-time" value="${d.time||''}"></div>
    `;
  }
  const labels = {note:'Note', task:'Task', goal:'Goal', event:'Event'};
  return `<div class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <h3>${d.id ? 'Edit' : 'New'} ${labels[state.modal]}</h3>
      ${body}
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>`;
}
function saveModal(){
  const type = state.modal; const d = state.modalData;
  if(type==='note'){
    const title = document.getElementById('m-title').value.trim() || 'Untitled';
    const bodyText = document.getElementById('m-body').value;
    const tags = document.getElementById('m-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    if(d.id){ const n=state.notes.find(x=>x.id===d.id); Object.assign(n,{title, body:bodyText, tags}); }
    else state.notes.unshift({id:uid(), title, body:bodyText, tags, favorite:false, createdAt:Date.now()});
    persist('notes');
  } else if(type==='task'){
    const title = document.getElementById('m-title').value.trim();
    if(!title){ showToast('Give the task a title'); return; }
    const priority = document.getElementById('m-priority').value;
    const dueDate = document.getElementById('m-due').value;
    const category = document.getElementById('m-category').value.trim();
    if(d.id){ const t=state.tasks.find(x=>x.id===d.id); Object.assign(t,{title,priority,dueDate,category}); }
    else state.tasks.push({id:uid(), title, priority, dueDate, category, completed:false});
    persist('tasks');
  } else if(type==='goal'){
    const title = document.getElementById('m-title').value.trim();
    if(!title){ showToast('Give the goal a title'); return; }
    const period = document.getElementById('m-period').value;
    if(d.id){ const g=state.goals.find(x=>x.id===d.id); Object.assign(g,{title,period}); }
    else state.goals.push({id:uid(), title, period, progress:0, createdAt:Date.now()});
    persist('goals');
  } else if(type==='event'){
    const title = document.getElementById('m-title').value.trim();
    if(!title){ showToast('Give the event a title'); return; }
    const date = document.getElementById('m-date').value;
    const time = document.getElementById('m-time').value;
    state.events.push({id:uid(), title, date, time});
    persist('events');
  }
  closeModal();
}

function attachDynamicHandlers(){ /* reserved for future direct DOM listeners */ }

loadAll();
</script>
